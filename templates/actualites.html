<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ titre }} - MusiActu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mb-4">⬅ Accueil</a>
        <h1 class="text-success mb-4">{{ titre }}</h1>

        <div class="row g-4">
            {% for actu in actus %}
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between">
                            <h2 class="card-title h4">{{ actu.titre }}</h2>
                            <span class="badge bg-info">{{ actu.categorie.nom }}</span>
                        </div>
                        <small class="text-muted">Publié le {{ actu.date_publication.strftime('%d/%m/%Y') }}</small>
                        <p class="card-text mt-3">{{ actu.contenu }}</p>
                    </div>
                </div>
            </div>
            {% else %}
            <p class="text-muted text-center mt-5">Aucun article dans cette catégorie pour le moment.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
